<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Career Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#021638,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:100%;
    max-width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-container h1{
    text-align:center;
    color:#021638;
    margin-bottom:10px;
}

.login-container p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#021638;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#2563eb;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:#2563eb;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="login-container">

    <h1>Welcome Back</h1>

    <p>Login to access jobs, internships and courses.</p>

    <form action="index.html">

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="register-link">
        Don't have an account?
        <a href="register.html">Register</a>
    </div>

</div>

</body></html>
